# ============================================
# Providers configuration example
# Copy this file to ~/.memo/providers.toml and fill in your credentials
# ============================================

# OpenAI
[openai]
name = "OpenAI"
api_key = "sk-your-openai-api-key"

  # Embedding service
  [openai.embed]
  base_url = "https://api.openai.com/v1"
  model = "text-embedding-3-small"
  dimension = 1536

  # LLM service
  [openai.llm]
  base_url = "https://api.openai.com/v1"
  model = "gpt-4o"

  # Multiple LLM services can be defined for the same provider with custom names,
  # then referenced individually in config.toml (e.g. decompose.llm_provider and summarize.llm_provider)
  # [openai.llm_mini]
  # base_url = "https://api.openai.com/v1"
  # model = "gpt-4o-mini"

# Ollama (local deployment, no API key required)
[ollama]
name = "Ollama Local"
api_key = ""

  # Embedding service
  [ollama.embed]
  base_url = "http://localhost:11434"
  model = "bge-m3"
  dimension = 1024

  # LLM service
  [ollama.llm]
  base_url = "http://localhost:11434"
  model = "qwen3"

