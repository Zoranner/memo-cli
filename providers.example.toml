# Providers configuration example for the local engine.
# Copy this file to ~/.memo/providers.toml and fill in the services you want to use.

[openai]
api_key = "sk-your-openai-api-key"

[openai.embed]
base_url = "https://api.openai.com/v1"
model = "text-embedding-3-small"
dimension = 1536

[openai.extract]
base_url = "https://api.openai.com/v1"
model = "gpt-4o-mini"

[ollama]
api_key = ""

[ollama.embed]
base_url = "http://127.0.0.1:11434/v1"
model = "bge-m3"
dimension = 1024

[ollama.extract]
base_url = "http://127.0.0.1:11434/v1"
model = "qwen2.5:7b"

