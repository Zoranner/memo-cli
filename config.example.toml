# Memo local engine config example
# Copy this file to ./.memo/config.toml and adjust the provider references you want to use.

[embed]
# Reference format: <provider>.<service>
embedding_provider = "openai.embed"
# Reserved for duplicate handling during remember.
duplicate_threshold = 0.85

[extract]
# Reference format: <provider>.<service>
# Used by `memo remember --dry-run` and slow-path `memo dream` extraction.
extraction_provider = "openai.extract"
# Drop noisy provider results below this threshold.
min_confidence = 0.5
# Convert extracted predicates like "Lives In" to snake_case.
normalize_predicates = true

[rerank]
# Optional deep-search rerank provider. Only used when recall enters deep search.
# rerank_provider = "aliyun.rerank"
