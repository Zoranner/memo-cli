# Memo 配置文件示例
# 复制此文件到 ~/.memo/config.toml 并根据需要修改

# ============================================
# 嵌入配置（记录记忆时）
# ============================================
[embed]
# Embedding 服务引用
embedding_provider = "aliyun.embed"
# 重复检测阈值（0.0-1.0）
duplicate_threshold = 0.85

# ============================================
# 搜索配置
# ============================================
[search]
# Rerank 服务引用
rerank_provider = "aliyun.rerank"
# LLM 服务引用（默认用于拆解和总结）
llm_provider = "aliyun.llm"
# 返回结果数量上限
results_limit = 10
# 向量搜索相似度阈值（0.0-1.0）
similarity_threshold = 0.35
# 多层搜索深度（1 = 禁用多层扩展）
max_depth = 5
# 每层扩展分支数
branch_limit = 5
# 扩展时是否要求标签重叠
require_tag_overlap = true

# ============================================
# 搜索 > 拆解配置
# ============================================
[decompose]
# LLM 服务引用（可选，覆盖 search.llm_provider）
# llm_provider = "openai.llm"
# 最大叶子节点数
max_leaves = 12
# 拆解策略提示词（可选，覆盖内置策略）
# strategy_prompt = "按以下五维模型拆解：core, why, how, case, note"

# ============================================
# 搜索 > 合并配置
# ============================================
[merge]
# 每个子问题召回候选数
candidates_per_query = 50
# 每个叶子保留数
results_per_leaf = 5
# 最终返回最大结果数
max_results = 20
# 去重阈值（0.0-1.0）
dedup_threshold = 0.98

# ============================================
# 搜索 > 总结配置
# ============================================
[summarize]
# LLM 服务引用（可选，覆盖 search.llm_provider）
# llm_provider = "openai.llm"
# 总结策略提示词（可选，覆盖内置策略）
# strategy_prompt = "请综合多条记忆，给出简洁、结构化的回答..."
